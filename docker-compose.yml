services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aibrain
      POSTGRES_PASSWORD: aibrain
      POSTGRES_DB: aibrain
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibrain"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3001"
    environment:
      DATABASE_URL: "postgresql://aibrain:aibrain@postgres:5432/aibrain?schema=public"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      PUBLIC_ORIGIN: "${PUBLIC_ORIGIN}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN}"
      WECHAT_APP_ID: "${WECHAT_APP_ID}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET}"
      WECHAT_REDIRECT_URI: "${WECHAT_REDIRECT_URI}"
      WECHAT_STATE_SECRET: "${WECHAT_STATE_SECRET}"
      ALLOW_NICKNAME_LOGIN: "${ALLOW_NICKNAME_LOGIN:-true}"
      ALLOW_PRESET_TEST_USERS: "${ALLOW_PRESET_TEST_USERS:-true}"
      LOGIN_PASSWORD_SECRET: "${LOGIN_PASSWORD_SECRET:-}"
      PERSONA_BASE_PATH: "/app/personas"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:

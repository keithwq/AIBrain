services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aibrain
      POSTGRES_PASSWORD: aibrain
      POSTGRES_DB: aibrain
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibrain"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3001"
    environment:
      DATABASE_URL: "postgresql://aibrain:aibrain@postgres:5432/aibrain?schema=public"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      PERSONA_BASE_PATH: "/app/personas"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "80:5173"
    depends_on:
      - backend

volumes:
  pgdata:
